{% extends "base.html" %}

{% block css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
{% endblock %}

{% block login_content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card border-0 shadow-lg rounded-4 overflow-hidden animate__animated animate__fadeInDown">
            <div class="p-4 text-center pb-0">
                <div class="brand-logo mx-auto mb-3" style="width: 64px; height: 64px; font-size: 2rem;">
                    <i class="fas fa-shield-halved"></i>
                </div>
                <h3 class="text-primary fw-bold mb-0">Changement de mot de passe</h3>
                <p class="text-muted small">Première connexion</p>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('auth.change_password') }}" method="POST">
                    <div class="form-floating position-relative mb-3">
                        <input type="password" name="current_password" class="form-control pe-5" id="currentPassword" placeholder="Mot de passe actuel" required>
                        <label for="currentPassword">Mot de passe actuel</label>
                        <button type="button" class="password-toggle" data-toggle-password data-target="currentPassword" aria-pressed="false">
                            <i class="fas fa-eye"></i><span>Afficher</span>
                        </button>
                    </div>
                    <div class="form-floating position-relative mb-3">
                        <input type="password" name="new_password" class="form-control pe-5" id="newPassword" placeholder="Nouveau mot de passe" required>
                        <label for="newPassword">Nouveau mot de passe</label>
                        <button type="button" class="password-toggle" data-toggle-password data-target="newPassword" aria-pressed="false">
                            <i class="fas fa-eye"></i><span>Afficher</span>
                        </button>
                    </div>
                    <div class="form-floating position-relative mb-4">
                        <input type="password" name="confirm_password" class="form-control pe-5" id="confirmPassword" placeholder="Confirmer le mot de passe" required>
                        <label for="confirmPassword">Confirmer le mot de passe</label>
                        <button type="button" class="password-toggle" data-toggle-password data-target="confirmPassword" aria-pressed="false">
                            <i class="fas fa-eye"></i><span>Afficher</span>
                        </button>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3 shadow fw-bold">METTRE À JOUR</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block js %}
<script src="{{ url_for('static', filename='js/password_toggle.js') }}"></script>
{% endblock %}
